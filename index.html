<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Suresh Myathari | Software Developer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
    --bg: #ffffff;
    --text-primary: #111827;
    --text-secondary: #4b5563;
    --accent: #2563eb;
    --card-bg: rgba(255, 255, 255, 0.8);
    --card-border: #e5e7eb;
    --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
}

html.dark-mode {
    --bg: #030712;
    --text-primary: #f9fafb;
    --text-secondary: #9ca3af;
    --accent: #60a5fa;
    --card-bg: rgba(17, 24, 39, 0.7);
    --card-border: #374151;
    --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
}

body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg);
    color: var(--text-primary);
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    transition: background 0.4s ease;
}

.main-wrapper {
    max-width: 800px;
    width: 90%;
    margin: 40px auto;
    text-align: center;
}

.profile-img-container img {
    width: 140px;
    height: 140px;
    border-radius: 50%; /* Circular shape */
    object-fit: cover;
    border: 2px solid var(--card-border);
    box-shadow: var(--glass-shadow);
    margin-bottom: 1rem;
}

h1 {
    font-family: 'Outfit', sans-serif;
    font-size: 2.5rem;
    margin: 0;
    letter-spacing: -0.02em;
}

.badge {
    display: inline-block;
    background: var(--accent);
    color: white;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 600;
    margin-top: 10px;
}

.intro-text {
    max-width: 580px;
    margin: 1.5rem auto 0;
    line-height: 1.6;
    color: var(--text-secondary);
    font-size: 1rem;
}

.intro-text .highlight {
    color: var(--accent);
    font-weight: 600;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 1.2rem;
    margin-top: 2rem;
}

.card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 1.5rem;
    text-decoration: none;
    color: inherit;
    display: flex;
    align-items: center;
    gap: 1rem;
    transition: transform 0.3s ease, border-color 0.3s ease;
    box-shadow: var(--glass-shadow);
}

.card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
}

.card-icon {
    background: var(--accent);
    color: #fff;
    width: 45px;
    height: 45px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
}

.card-text h3 {
    margin: 0;
    font-size: 1.1rem;
}

.card-text p {
    margin: 4px 0 0;
    font-size: 0.85rem;
    color: var(--text-secondary);
}

.social-media {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-top: 3rem;
    flex-wrap: wrap;
}

.social-media a {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 16px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    color: var(--text-primary);
    font-weight: 500;
    font-size: 0.9rem;
    text-decoration: none;
    transition: all 0.3s ease;
    box-shadow: var(--glass-shadow);
}

.social-media a i {
    font-size: 1.2rem;
}

.social-media a:hover {
    transform: translateY(-3px);
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 6px 18px rgba(37, 99, 235, 0.15);
}

.theme-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    cursor: pointer;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}

@media (max-width: 640px) {
    h1 { font-size: 2rem; }
    .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<button class="theme-btn" id="themeToggle" aria-label="Toggle Dark Mode">
    <i class="fas fa-moon" id="themeIcon"></i>
</button>

<div class="main-wrapper">
    <section class="hero">
        <div class="profile-img-container">
            <img src="assets/images/sureshPhoto.jpg" alt="Suresh Myathari">
        </div>
        <h1>Suresh Myathari</h1>
        <div class="badge">Software Developer</div>
        <div class="intro-text">
            Welcome! Explore my <span class="highlight">projects</span> below.
        </div>
    </section>

    <div class="grid">
        <a href="https://sureshm-1729.github.io/careerNavigation/" class="card" target="_blank">
            <div class="card-icon"><i class="fas fa-graduation-cap"></i></div>
            <div class="card-text">
                <h3>Career Navigation</h3>
                <p>Strategic roadmaps for choosing your path in higher education.</p>
            </div>
        </a>
        <a href="https://syntax-circuit.github.io/app/index.html" class="card" target="_blank">
            <div class="card-icon"><i class="fas fa-university"></i></div>
            <div class="card-text">
                <h3>Syntax Circuit</h3>
                <p>Professional IT coaching and computer science academic tuitions.</p>
            </div>
        </a>
    </div>

    <nav class="social-media">
        <a href="https://github.com/SureshM-1729" target="_blank"><i class="fab fa-github"></i> GitHub</a>
        <a href="https://www.linkedin.com/in/suresh-myathari" target="_blank"><i class="fab fa-linkedin-in"></i> LinkedIn</a>
        <a href="mailto:sureshswaero1729@gmail.com"><i class="fas fa-envelope"></i> Email</a>
    </nav>
</div>

<script>
const btn = document.getElementById('themeToggle');
const icon = document.getElementById('themeIcon');

btn.addEventListener('click', () => {
    document.documentElement.classList.toggle('dark-mode');
    icon.className = document.documentElement.classList.contains('dark-mode') ? 'fas fa-sun' : 'fas fa-moon';
});
</script>

</body>
</html>
